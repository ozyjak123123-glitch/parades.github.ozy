<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OZYWEB</title>

<style>

/* ===== GLOBAL ===== */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:black;
color:white;
text-align:center;
}

/* ===== HEADER ===== */

header{

background:linear-gradient(90deg,#00c6ff,#7b00ff);

padding:25px;

border-bottom:5px solid black;

}

header h1{

margin:0;

font-size:40px;

color:red;

text-shadow:
2px 2px 0 black,
4px 4px 0 black;

}

/* ===== CONTAINER ===== */

.container{

padding:20px;

max-width:500px;

margin:auto;

}

/* ===== TITLE ===== */

.title{

font-size:28px;

color:red;

margin-bottom:20px;

text-shadow:2px 2px black;

}

/* ===== MENU BUTTON ===== */

.menu{

display:flex;

flex-direction:column;

gap:15px;

}

.menu button{

padding:18px;

font-size:22px;

font-weight:bold;

background:#eaeaea;

color:#00ffff;

border-radius:40px;

border:4px solid black;

text-shadow:1px 1px black;

box-shadow:0 5px 0 black;

transition:0.2s;

}

.menu button:active{

transform:translateY(5px);

box-shadow:0 0 0 black;

}

/* ===== FEATURE PANEL ===== */

.feature{

display:none;

margin-top:20px;

padding:20px;

background:#19d3d6;

border:5px solid black;

border-radius:15px;

animation:fade 0.3s ease;

}

@keyframes fade{

from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}

}

/* ===== INPUT ===== */

input{

width:100%;

padding:15px;

margin-top:10px;

font-size:18px;

border:4px solid black;

border-radius:8px;

}

/* ===== TEXTAREA ===== */

textarea{

width:100%;

height:120px;

padding:10px;

margin-top:10px;

font-size:16px;

border:4px solid black;

border-radius:8px;

}

/* ===== ACTION BUTTON ===== */

.action{

margin-top:15px;

background:red;

color:white;

font-size:20px;

padding:15px;

border-radius:10px;

border:4px solid black;

font-weight:bold;

box-shadow:0 5px 0 black;

}

.action:active{

transform:translateY(5px);

box-shadow:0 0 0 black;

}

/* ===== RESULT BOX ===== */

.result{

margin-top:10px;

background:white;

color:black;

padding:10px;

border:4px solid black;

border-radius:8px;

min-height:80px;

font-weight:bold;

}

footer{

margin-top:40px;

font-size:12px;

opacity:0.7;

}

</style>

</head>

<body>

<header>
<h1>OZYWEB</h1>
</header>

<div class="container">

<div class="title">Kirim Ke Target</div>

<div class="menu">

<button onclick="openFeature('send')">
Kirim Pesan
</button>

<button onclick="openFeature('lookup')">
Cari Informasi
</button>

<button onclick="openFeature('control')">
Control Panel
</button>

</div>

<!-- ===== FEATURE 1 ===== -->

<div id="send" class="feature">

<h3>ISI NOMOR TARGET</h3>

<input id="targetNumber" placeholder="Masukkan nomor">

<button class="action" onclick="sendAction()">
Kirim
</button>

<div class="result" id="sendResult">
Menunggu aksi...
</div>

</div>

<!-- ===== FEATURE 2 ===== -->

<div id="lookup" class="feature">

<h3>ISI NOMOR TARGET</h3>

<input id="lookupNumber" placeholder="Masukkan nomor">

<button class="action" onclick="lookupAction()">
Cari Data
</button>

<div class="result" id="lookupResult">
Belum ada hasil
</div>

</div>

<!-- ===== FEATURE 3 ===== -->

<div id="control" class="feature">

<h3>Google Target</h3>

<input id="controlInput" placeholder="Masukkan kata kunci">

<button class="action" onclick="controlAction()">
Control
</button>

<div class="result" id="controlResult">
Panel siap digunakan
</div>

</div>

<footer>
OZYWEB SYSTEM
</footer>

</div>

<script>

/* ===== OPEN FEATURE ===== */

function openFeature(id){

let panels=document.querySelectorAll(".feature")

panels.forEach(p=>{
p.style.display="none"
})

document.getElementById(id).style.display="block"

}

/* ===== SEND ACTION ===== */

function sendAction(){

let num=document.getElementById("targetNumber").value

if(num==""){

alert("Nomor harus diisi")

return

}

document.getElementById("sendResult").innerText=
"Permintaan dikirim ke: "+num+" (demo UI)"

}

/* ===== LOOKUP ACTION ===== */

function lookupAction(){

let num=document.getElementById("lookupNumber").value

if(num==""){

alert("Nomor harus diisi")

return

}

document.getElementById("lookupResult").innerText=
"Mencari data untuk "+num+"...\n(API belum terhubung)"

}

/* ===== CONTROL ACTION ===== */

function controlAction(){

let val=document.getElementById("controlInput").value

document.getElementById("controlResult").innerText=
"Control dijalankan untuk: "+val+" (demo)"

}

</script>

</body>
</html>
