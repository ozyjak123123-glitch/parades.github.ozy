<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OZYWEB</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* HEADER */

.header{

background:linear-gradient(90deg,#00d0ff,#2a00ff);

padding:25px;

border-bottom:6px solid black;

}

.header h1{

margin:0;

font-size:42px;

color:red;

text-shadow:
2px 2px black,
4px 4px black;

}

/* CONTAINER */

.container{

padding:20px;

max-width:480px;

margin:auto;

}

/* TITLE */

.title{

color:red;

font-size:30px;

margin-top:10px;

text-shadow:2px 2px black;

}

/* MENU */

.menu{

margin-top:25px;

display:flex;

flex-direction:column;

gap:15px;

}

.menu button{

padding:16px;

font-size:24px;

background:#eeeeee;

color:#00ffff;

border-radius:40px;

border:5px solid black;

font-weight:bold;

text-shadow:2px 2px black;

box-shadow:0 6px 0 black;

transition:0.2s;

}

.menu button:active{

transform:translateY(6px);

box-shadow:0 0 0 black;

}

/* FEATURE BOX */

.feature{

display:none;

margin-top:25px;

padding:20px;

background:#18d0d4;

border:6px solid black;

border-radius:12px;

animation:fade 0.3s;

}

@keyframes fade{

from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}

}

/* INPUT */

input{

width:100%;

padding:14px;

margin-top:10px;

font-size:18px;

border:4px solid black;

}

/* TEXTAREA */

textarea{

width:100%;

height:120px;

margin-top:10px;

padding:10px;

font-size:16px;

border:4px solid black;

}

/* ACTION BUTTON */

.action{

margin-top:15px;

background:red;

color:white;

font-size:22px;

padding:15px;

border-radius:10px;

border:5px solid black;

font-weight:bold;

box-shadow:0 5px 0 black;

}

.action:active{

transform:translateY(5px);

box-shadow:0 0 0 black;

}

/* RESULT */

.result{

background:white;

color:black;

margin-top:10px;

padding:10px;

border:4px solid black;

min-height:80px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="header">
<h1>OZYWEB</h1>
</div>

<div class="container">

<div class="title">Kirim Ke Target</div>

<div class="menu">

<button onclick="openFeature('virus')">
Kirim Virus
</button>

<button onclick="openFeature('lacak')">
Lacak Nomor
</button>

<button onclick="openFeature('kamera')">
Control Kamera
</button>

</div>

<!-- KIRIM VIRUS -->

<div id="virus" class="feature">

<h3>ISI NOMOR TARGET</h3>

<input id="virusNumber">

<button class="action" onclick="virusAction()">
Kirim
</button>

<div class="result" id="virusResult">
Menunggu perintah...
</div>

</div>

<!-- LACAK NOMOR -->

<div id="lacak" class="feature">

<h3>ISI NOMOR TARGET</h3>

<input id="lacakNumber">

<button class="action" onclick="lacakAction()">
CARI Lokasi
</button>

<textarea placeholder="Lokasi.."></textarea>

</div>

<!-- CONTROL KAMERA -->

<div id="kamera" class="feature">

<h3>Google Target</h3>

<input>

<h3>Control</h3>

<textarea></textarea>

<div class="result">
HASIL
</div>

</div>

</div>

<script>

/* buka panel */

function openFeature(id){

let panel=document.querySelectorAll(".feature")

panel.forEach(p=>{

p.style.display="none"

})

document.getElementById(id).style.display="block"

}

/* aksi demo */

function virusAction(){

let num=document.getElementById("virusNumber").value

if(num==""){

alert("ISI NOMOR TARGET")

return

}

document.getElementById("virusResult").innerText=
"Target "+num+" diproses (demo UI)"

}

function lacakAction(){

let num=document.getElementById("lacakNumber").value

if(num==""){

alert("ISI NOMOR TARGET")

return

}

alert("Mencari lokasi untuk "+num+" (demo)")

}

</script>

</body>
</html>
