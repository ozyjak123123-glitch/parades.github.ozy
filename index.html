<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OZYWEB</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:white;
text-align:center;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#00d4ff,#2d00ff,#7a00ff);
padding:28px;
border-bottom:6px solid black;
}

.header h1{
margin:0;
font-size:42px;
color:#ff0000;
text-shadow:
2px 2px 0 black,
4px 4px 0 black,
0 0 10px red;
}

/* CONTAINER */

.container{
max-width:480px;
margin:auto;
padding:20px;
}

/* TITLE */

.title{
font-size:30px;
color:red;
text-shadow:2px 2px black;
margin-top:10px;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:15px;
margin-top:25px;
}

.menu button{

padding:18px;
font-size:24px;

background:#eeeeee;
color:#00ffff;

border-radius:40px;
border:5px solid black;

font-weight:bold;

text-shadow:2px 2px black;

box-shadow:
0 6px 0 black,
0 0 10px #00ffff;

transition:0.2s;

}

.menu button:active{
transform:translateY(6px);
box-shadow:0 0 0 black;
}

/* PANEL */

.feature{

display:none;

margin-top:25px;

padding:20px;

background:#1cd4d8;

border:6px solid black;

border-radius:12px;

box-shadow:0 0 15px #00ffff;

animation:fade .25s;

}

@keyframes fade{
from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:scale(1)}
}

/* INPUT */

input{

width:100%;

padding:14px;

font-size:18px;

margin-top:10px;

border:4px solid black;

border-radius:8px;

}

/* TEXTAREA */

textarea{

width:100%;

height:120px;

margin-top:10px;

padding:10px;

font-size:16px;

border:4px solid black;

border-radius:8px;

}

/* BUTTON */

.action{

margin-top:15px;

background:#ff0000;
color:white;

font-size:22px;

padding:15px;

border-radius:10px;

border:5px solid black;

font-weight:bold;

box-shadow:0 5px 0 black;

}

.action:active{
transform:translateY(5px);
box-shadow:0 0 0 black;
}

/* RESULT */

.result{

margin-top:10px;

background:white;

color:black;

padding:10px;

border:4px solid black;

min-height:80px;

font-weight:bold;

}

footer{
margin-top:30px;
opacity:.6;
font-size:12px;
}

</style>
</head>

<body>

<div class="header">
<h1>OZYWEB</h1>
</div>

<div class="container">

<div class="title">Kirim Ke Target</div>

<div class="menu">

<button onclick="openPanel('panel1')">
Kirim Virus
</button>

<button onclick="openPanel('panel2')">
Lacak Nomor
</button>

<button onclick="openPanel('panel3')">
Control Kamera
</button>

</div>

<!-- PANEL 1 -->

<div id="panel1" class="feature">

<h3>ISI NOMOR TARGET</h3>

<input id="nomor1">

<button class="action" onclick="demo('hasil1')">
Kirim
</button>

<div id="hasil1" class="result">
Menunggu aksi...
</div>

</div>

<!-- PANEL 2 -->

<div id="panel2" class="feature">

<h3>ISI NOMOR TARGET</h3>

<input id="nomor2">

<button class="action" onclick="demo('hasil2')">
CARI Lokasi
</button>

<textarea placeholder="Lokasi.."></textarea>

<div id="hasil2" class="result">
HASIL
</div>

</div>

<!-- PANEL 3 -->

<div id="panel3" class="feature">

<h3>Google Target</h3>

<input>

<h3>Control</h3>

<textarea></textarea>

<div class="result">
HASIL
</div>

</div>

<footer>
OZYWEB SYSTEM
</footer>

</div>

<script>

function openPanel(id){

let p=document.querySelectorAll(".feature")

p.forEach(x=>x.style.display="none")

document.getElementById(id).style.display="block"

}

function demo(id){

document.getElementById(id).innerText=
"Fitur demo aktif. Hubungkan API untuk fungsi sebenarnya."

}

</script>

</body>
</html>
